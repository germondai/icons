name: 🐛 Bug Report
description: Something isn't working as expected
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill in as much detail as possible.
        You can also try the [live API](https://icons.germondai.com) to compare behavior.

  - type: textarea
    id: description
    attributes:
      label: 🐛 Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: 🔁 Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Make a request to `GET /icons?i=...`
        2. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: ✅ Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: ❌ Actual behavior
      description: What actually happened? Include any error messages or screenshots.
    validations:
      required: true

  - type: input
    id: url
    attributes:
      label: 🔗 Example URL
      description: Paste the full request URL if applicable.
      placeholder: "https://icons.germondai.com/icons?i=..."

  - type: dropdown
    id: deployment
    attributes:
      label: 🚀 Deployment
      options:
        - Live API (icons.germondai.com)
        - Self-hosted (Bun)
        - Self-hosted (Docker)
    validations:
      required: true

  - type: input
    id: bun-version
    attributes:
      label: 🟡 Bun version
      description: "`bun --version` (only relevant for self-hosted)"
      placeholder: "1.x.x"

  - type: textarea
    id: context
    attributes:
      label: 📎 Additional context
      description: Anything else that might help — screenshots, related issues, etc.
